services:

  # ==============================
  # База данных — MySQL 8
  # ==============================
  db:
    image: mysql:8.0
    container_name: ayr_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  # Бэкенд — PHP 8.2 + Apache
  # ==============================
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ayr_php
    restart: always
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

  # ==============================
  # Фронтенд — Vue / Vite (dev-режим)
  # ==============================
  frontend:
    image: node:20-alpine
    container_name: ayr_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - php

volumes:
  db_data:
