services:

  db:
    image: mysql:8.0
    container_name: ayr_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: svar_system
      MYSQL_USER: team_user
      MYSQL_PASSWORD: team_pass

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql
      - ./docker:/docker-entrypoint-initdb.d

  php:
    image: php:8.2-apache
    container_name: ayr_php
    restart: always

    ports:
      - "8000:80"

    volumes:
      - ./backend:/var/www/html

    depends_on:
      - db

    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql &&
               apache2-foreground"

volumes:
  db_data: